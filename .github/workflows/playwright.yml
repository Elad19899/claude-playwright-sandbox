name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Runs at 00:00 every day by default. You can change the cron expression.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to run tests against'
        required: true
        type: choice
        default: 'staging'
        options:
          - dev
          - staging
          - prod
      run_api_tests:
        description: 'Run API Tests'
        required: true
        type: boolean
        default: true
      run_ui_tests:
        description: 'Run UI Tests'
        required: true
        type: boolean
        default: true

jobs:
  api-tests:
    name: API Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_api_tests }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright API tests
        # We only run tests inside the api directory for this job
        run: npx playwright test tests/api/
        env:
          TEST_ENV: ${{ inputs.environment || 'staging' }}

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report/
          retention-days: 30

  ui-tests:
    name: UI Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_ui_tests }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome for Playwright
        run: npx playwright install --with-deps chrome

      - name: Run Playwright UI tests
        # We ignore the api directory for this job
        run: npx playwright test --ignore="tests/api/**"
        env:
          TEST_ENV: ${{ inputs.environment || 'staging' }}

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui
          path: allure-report/
          retention-days: 30
